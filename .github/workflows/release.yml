name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install nasm
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then sudo apt-get update && sudo apt-get install -y nasm; else brew install nasm; fi
      - run: cargo build --release --features asm --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf crunchit-${{ github.ref_name }}-${{ matrix.target }}.tar.gz crunchit
      - uses: actions/upload-artifact@v4
        with:
          name: crunchit-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/crunchit-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum crunchit-*.tar.gz > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            crunchit-*.tar.gz
            SHA256SUMS
          generate_release_notes: true
